[project]
name = "indexed-connectors"
version = "0.1.0"
description = "Document connectors for Jira, Confluence, and local file systems with support for both Cloud and Server/DC versions"
readme = "README.md"
authors = [
    { name = "Lennard Zündorf", email = "lennard@zuendorf.me" }
]
requires-python = ">=3.11"
dependencies = [
    "indexed-utils",
    "orjson>=3.10.0",
    "requests>=2.32.0",
    "httpx>=0.27",
    "bs4>=0.0.2",
    "langchain>=0.3.26",
    "langchain-text-splitters>=0.3.0",
    "unstructured[all-docs]>=0.18.5",
    "atlassian-python-api>=3.41.16",
    "loguru>=0.7.0",
]

[tool.uv.sources]
indexed-utils = { workspace = true }

[build-system]
requires = ["hatchling", "hatch-una"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.hooks.una-build]

[tool.hatch.metadata.hooks.una-meta]

[tool.hatch.build.targets.wheel]
packages = ["src/connectors"]
