[project]
name = "indexed-connectors"
version = "0.1.0"
description = "Document connectors for Jira, Confluence, and file systems"
readme = "README.md"
authors = [
    { name = "Lennard Zündorf", email = "l.p.zuendorf@gmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "indexed-utils",
    "requests>=2.32.0",
    "bs4>=0.0.2",
    "langchain>=0.3.26",
    "unstructured[all-docs]>=0.18.5",
]

[tool.uv.sources]
indexed-utils = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/connectors"]
