[project]
name = "indexed-utils"
version = "0.1.0"
description = "Shared utility functions for the indexed project including logging, retry logic, batching, and performance monitoring"
readme = "README.md"
authors = [
    { name = "Lennard Zündorf", email = "lennard@zuendorf.me" }
]
requires-python = ">=3.10"
dependencies = [
    "loguru>=0.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/utils"]
