[project]
name = "indexed-parsing"
version = "0.1.0"
description = "Reusable document parsing module: Docling, tree-sitter, and plaintext"
readme = "README.md"
authors = [
    { name = "Lennard Zündorf", email = "lennard@zuendorf.me" }
]
requires-python = ">=3.11"
dependencies = [
    "docling>=2.70.0",
    "docling-core>=2.8.0",
    "tree-sitter>=0.23",
    "tree-sitter-python>=0.23",
    "tree-sitter-javascript>=0.23",
    "tree-sitter-typescript>=0.23",
    "tree-sitter-java>=0.23",
    "tree-sitter-rust>=0.23",
    "tree-sitter-go>=0.23",
    "tree-sitter-c>=0.23",
    "tree-sitter-cpp>=0.23",
    "xxhash>=3.0",
    "loguru>=0.7.0",
]

[tool.uv.sources]

[build-system]
requires = ["hatchling", "hatch-una"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.hooks.una-build]

[tool.hatch.metadata.hooks.una-meta]

[tool.hatch.build.targets.wheel]
packages = ["src/parsing"]
