[project]
name = "indexed-core"
version = "0.1.0"
description = "Core library for document indexing and semantic search with FAISS and sentence-transformers"
readme = "README.md"
authors = [
    { name = "Lennard Zündorf", email = "lennard@zuendorf.me" }
]
requires-python = ">=3.11"
dependencies = [
    "indexed-utils",
    "indexed-connectors",
    "faiss-cpu>=1.11.0",
    "sentence-transformers>=5.2.0",
    "onnxruntime>=1.17.0",
    "orjson>=3.10.0",
    "pydantic>=2.0.0",
]

[tool.uv.sources]
indexed-utils = { workspace = true }
indexed-connectors = { workspace = true }

[build-system]
requires = ["hatchling", "hatch-una"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.hooks.una-build]

[tool.hatch.metadata.hooks.una-meta]

[tool.hatch.build.targets.wheel]
packages = ["src/core"]

[tool.hatch.build.targets.sdist]
only-include = ["src/core"]
