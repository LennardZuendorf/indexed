[project]
name = "indexed-core"
version = "0.1.0"
description = "Core library for document indexing and semantic search with FAISS and sentence-transformers"
readme = "README.md"
authors = [
    { name = "Lennard Zündorf", email = "l.p.zuendorf@gmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "indexed-utils",
    "indexed-connectors",
    "bs4>=0.0.2",
    "faiss-cpu>=1.11.0",
    "langchain>=0.3.26",
    "requests>=2.32.4",
    "sentence-transformers>=5.0.0",
    "llama-index-embeddings-huggingface-api>=0.1.3",
    "unstructured[all-docs]>=0.18.5",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.2.1",
    "platformdirs>=4.2.0",
    "tomlkit>=0.13.0",
    "tomli>=2.0.0; python_version < '3.11'",
    "tomli-w>=1.0.0",
    "portalocker>=2.8.0",
    # LlamaIndex for RAG query engine
    "llama-index-core>=0.11.0",
    "llama-index-llms-openai>=0.3.0",
    "llama-index-vector-stores-faiss>=0.3.0",
]

[tool.uv.sources]
indexed-utils = { workspace = true }
indexed-connectors = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]
