# Indexed - Default Configuration Template
# This file serves as a template and documentation for all available configuration options.
# Copy this file to ~/.indexed/config.toml or <workspace>/.indexed/config.toml and customize.

[workspace]
# Workspace name (descriptive identifier)
name = "default"

# Root path of the workspace (will be set automatically for workspace-specific configs)
root_path = "/path/to/workspace"

# Path where index data will be stored (defaults to <root_path>/.indexed)
# index_path = "/path/to/workspace/.indexed"


[embedding]
# Embedding provider (currently only "sentence-transformers" is supported)
provider = "sentence-transformers"

# Model name from sentence-transformers
# Popular options:
#   - "all-MiniLM-L6-v2" (default, fast, 384 dimensions)
#   - "all-mpnet-base-v2" (better quality, 768 dimensions, slower)
#   - "multi-qa-MiniLM-L6-cos-v1" (optimized for semantic search)
model_name = "all-MiniLM-L6-v2"

# Embedding dimension (auto-detected from model, but can be overridden)
dimension = 384

# Batch size for embedding generation
batch_size = 32

# Device to use for embeddings: "cpu", "cuda", "mps", or null for auto-detect
# device = null


[vector_store]
# Vector store type (currently only "faiss" is supported)
type = "faiss"

# FAISS index type:
#   - "IndexFlatL2": Exact L2 distance search (slower but accurate)
#   - "IndexFlatIP": Exact inner product search
index_type = "IndexFlatL2"

# Enable persistence (save index to disk)
persistence_enabled = true

# Path to persist the index (defaults to ~/.indexed/faiss_index)
# persistence_path = "/Users/username/.indexed/faiss_index"


[indexing]
# Maximum size of each text chunk in characters
chunk_size = 512

# Number of characters to overlap between chunks
chunk_overlap = 50

# File patterns to exclude from indexing
exclude_patterns = [
    "*.pyc",
    "__pycache__",
    ".git",
    "node_modules",
    ".venv",
    "venv",
    ".env",
    "*.log",
    ".DS_Store",
    "*.min.js",
    "*.min.css"
]

# File patterns to include in indexing
include_patterns = [
    "*.py",
    "*.md",
    "*.txt",
    "*.rst",
    "*.js",
    "*.ts",
    "*.jsx",
    "*.tsx",
    "*.java",
    "*.go",
    "*.rs",
    "*.c",
    "*.cpp",
    "*.h",
    "*.hpp",
    "*.sh",
    "*.yaml",
    "*.yml",
    "*.json",
    "*.toml"
]


[connectors]
# FileSystem connector (read files from local filesystem)
filesystem_enabled = true
filesystem_watch = false  # Future: watch for file changes

# Git connector (future: read files from git repositories)
git_enabled = false


[search]
# Default number of results to return
default_top_k = 10

# Minimum similarity score (0.0-1.0, 0.0 = no threshold)
similarity_threshold = 0.0
