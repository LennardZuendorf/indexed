[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = "--benchmark-autosave"

# Test markers for characteristics (not location - use directory structure for that)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    unit_api: marks tests that use mocked API responses
    benchmark: marks tests as performance benchmarks
