coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 1%
        informational: false
    patch:
      default:
        target: 70%
        threshold: 1%
        informational: false

ignore:
  - "tests/**"
  - ".benchmarks/**"
  - "**/__pycache__/**"
  - "**/*.pyc"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
