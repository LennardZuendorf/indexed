name: Python Full Test Suite with Coverage

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main", "building*" ]
  push:
    branches: [ "main" ]

jobs:
  full-test-suite:
    name: Unit + Integration Tests with Coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install uv
          python -m uv sync
          # Ruff and pytest should be installed via project dependencies, not as standalone tools

      - name: Run Ruff Linter
        run: |
          uv run ruff check

      - name: Run Unit Tests
        run: |
          uv run pytest --cov --cov-branch --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests,integration
          name: codecov-umbrella
