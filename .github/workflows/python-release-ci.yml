name: Release — Build + Publish to PyPI

# Trigger: publish a GitHub Release in the GitHub UI (manual)
# Flow: build wheel from main → validate → publish to PyPI → attach to release
#
# Wheels are NEVER committed to git. They are built fresh in CI on every
# release, validated against PyPI's exact archive validator (tools/validate_wheel.py),
# uploaded to PyPI via OIDC trusted publishing, and attached to the GitHub Release
# as the durable archive.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # ── 1. Build the wheel from main and validate it ────────────────────────────
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      run: python -m pip install uv

    - name: Install dependencies
      run: uv sync

    - name: Build distributable wheel
      run: uvx --from build pyproject-build --installer=uv --outdir=dist --wheel apps/indexed

    - name: Validate wheel with PyPI's archive validator
      # Same checks PyPI's warehouse runs on upload. Failing here means PyPI
      # would reject — fail fast with the exact error message instead.
      run: uv run python tools/validate_wheel.py dist/*.whl

    - name: Upload wheel artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
        if-no-files-found: error
        # Wheels are already compressed; don't waste CI time recompressing.
        compression-level: 0

  # ── 2. Publish to PyPI via OIDC trusted publisher ───────────────────────────
  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/indexed-sh
    permissions:
      id-token: write   # OIDC trusted publishing
      contents: write   # attach wheel to GitHub Release

    steps:
    - name: Download wheel artifact
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      # Default packages-dir: dist/ — no override needed.

    - name: Attach wheel to GitHub Release
      if: always() && github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
