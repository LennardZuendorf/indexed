# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python Test and Upload Codecov Coverage

on:
  workflow_dispatch:
  push:
    branches: [ "main", "building*" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install uv
        python -m uv sync

    - name: Run Tests with Pytest and Coverage
      run: |
        uv run pytest --cov --cov-branch --cov-report=xml

    - name: Upload Coverage Report to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Run Test with Pytest and Junit Report
      run: |
        uv run pytest --cov --junitxml=junit.xml -o junit_family=legacy

    - name: Upload JUnit Report to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}