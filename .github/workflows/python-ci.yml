name: Python Build and System Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main", "building" ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-ci.yml'
      - 'tests/system/**'
  push:
    branches: [ "main", "building" ]

jobs:
  build-and-system-tests:
    if: github.event_name == 'push' || github.event.pull_request.draft != true
    name: Build and System Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install uv
        python -m uv sync

    - name: Run System Tests
      run: |
        uv run pytest tests/system/ -q --tb=short

    - name: Build Distributable Wheel (apps/indexed with bundled packages)
      run: uvx --from build pyproject-build --installer=uv --outdir=dist --wheel apps/indexed
