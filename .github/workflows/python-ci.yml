name: Python Setup, Test and Build

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main", "building*" ]
  push:
    branches: [ "main", "building*" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install uv
        python -m uv sync
        # Ruff and pytest should be installed via project dependencies, not as standalone tools

    - name: Run Tests with Pytest
      run: |
        uv run pytest -q

    - name: Build Distributable Wheel (apps/indexed with bundled packages)
      run: uvx --from build pyproject-build --installer=uv --outdir=dist --wheel apps/indexed
