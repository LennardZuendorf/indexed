name: copilot-setup-steps

on:
  workflow_call:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      run: |
        python -m pip install --upgrade pip
        python -m pip install uv

    - name: Sync dependencies with uv
      run: |
        python -m uv sync --group dev

    - name: Verify installation
      run: |
        python --version
        uv --version
        uv run python -c "import faiss; import sentence_transformers; import typer; import mcp; print('All dependencies installed successfully')"
