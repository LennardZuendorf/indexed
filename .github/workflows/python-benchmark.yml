name: Python Performance Benchmarks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-benchmark.yml'
      - 'tests/system/**'
      - 'tests/benchmarks/**'
  push:
    branches: [ "main", "building" ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-benchmark.yml'
      - 'tests/system/**'
      - 'tests/benchmarks/**'

jobs:
  benchmark:
    if: github.event_name == 'push' || github.event.pull_request.draft != true
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits
      pull-requests: write  # Required to comment on PRs
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]  # Use single version for consistent benchmarks

    steps:
    - uses: actions/checkout@v4
      with:
        # Fetch current + previous commit for baseline comparison
        fetch-depth: 2
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install uv
        python -m uv sync

    - name: Cache HuggingFace embedding model
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface/hub/models--sentence-transformers--all-MiniLM-L6-v2
        key: hf-model-all-MiniLM-L6-v2

    - name: Download embedding model
      run: |
        uv run python -c "
        from core.v1.engine.indexes.embeddings.model_manager import ensure_model
        ensure_model('all-MiniLM-L6-v2')
        print('Model ready')
        "

    - name: Determine branch names
      id: branch-info
      run: |
        # Get current branch name
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          CURRENT_BRANCH="${{ github.head_ref }}"
        else
          CURRENT_BRANCH="${{ github.ref_name }}"
        fi
        echo "current_branch=$CURRENT_BRANCH" >> $GITHUB_OUTPUT
        echo "main_branch=main" >> $GITHUB_OUTPUT
        echo "Current branch: $CURRENT_BRANCH"
        echo "Main branch: main"

    - name: Fetch PR target branch baseline
      if: github.event_name == 'pull_request'
      run: |
        git fetch origin ${{ github.base_ref }} --depth=1

    - name: Load baselines from repository
      id: load-baselines
      run: |
        mkdir -p .benchmarks/baselines
        CURRENT_BRANCH="${{ steps.branch-info.outputs.current_branch }}"

        # --- Baseline 1: PR target branch (main) for cross-branch comparison ---
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "📥 Loading PR target branch baseline..."
          if git show "origin/${{ github.base_ref }}:.benchmarks/baselines/${{ github.base_ref }}.json" 2>/dev/null > .benchmarks/baselines/main.json.tmp && [ -s .benchmarks/baselines/main.json.tmp ]; then
            mv .benchmarks/baselines/main.json.tmp .benchmarks/baselines/main.json
            echo "✅ Found target branch baseline"
            echo "main_baseline_exists=true" >> $GITHUB_OUTPUT
          else
            rm -f .benchmarks/baselines/main.json.tmp
            echo "ℹ️  No target branch baseline found"
            echo "main_baseline_exists=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "main_baseline_exists=false" >> $GITHUB_OUTPUT
        fi

        # --- Baseline 2: Previous commit for sequential comparison ---
        echo "📥 Loading previous commit baseline..."
        BASELINE_FILE="${CURRENT_BRANCH}.json"
        if git show "HEAD~1:.benchmarks/baselines/$BASELINE_FILE" 2>/dev/null > ".benchmarks/baselines/${BASELINE_FILE}.tmp" && [ -s ".benchmarks/baselines/${BASELINE_FILE}.tmp" ]; then
          if [ "$CURRENT_BRANCH" == "main" ]; then
            mv ".benchmarks/baselines/${BASELINE_FILE}.tmp" .benchmarks/baselines/main_previous.json
          else
            mv ".benchmarks/baselines/${BASELINE_FILE}.tmp" ".benchmarks/baselines/$BASELINE_FILE"
          fi
          echo "✅ Found previous commit baseline"
          echo "current_baseline_exists=true" >> $GITHUB_OUTPUT
        else
          rm -f ".benchmarks/baselines/${BASELINE_FILE}.tmp"
          echo "ℹ️  No previous commit baseline found"
          echo "current_baseline_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Run benchmarks
      id: run-benchmarks
      run: |
        uv run pytest tests/system tests/benchmarks \
          --benchmark-only \
          --benchmark-json=benchmark-results.json \
          --benchmark-autosave \
          -v

    - name: Extract node information
      id: extract-node
      if: always() && steps.run-benchmarks.outcome == 'success'
      run: |
        if [ -f benchmark-results.json ]; then
          NODE=$(python -c "import json; print(json.load(open('benchmark-results.json')).get('machine_info', {}).get('node', ''))")
          if [ -z "$NODE" ]; then
            echo "⚠️  Warning: Could not extract node from benchmark results"
            NODE="unknown"
          fi
          echo "node=$NODE" >> $GITHUB_OUTPUT
          echo "📊 Running on node: $NODE"
        else
          echo "node=unknown" >> $GITHUB_OUTPUT
        fi

    - name: Compare with main baseline (if exists)
      id: compare-main-baseline
      if: always() && steps.run-benchmarks.outcome == 'success' && steps.load-baselines.outputs.main_baseline_exists == 'true'
      run: |
        MAIN_BASELINE=".benchmarks/baselines/main.json"
        if [ ! -f "$MAIN_BASELINE" ]; then
          echo "❌ Error: Main baseline file not found"
          exit 1
        fi
        echo "📊 Comparing against main branch baseline (20% tolerance)..."
        uv run python .benchmarks/benchmark_compare.py compare-json \
          "$MAIN_BASELINE" \
          benchmark-results.json \
          --tolerance=20 > main_comparison.txt 2>&1 || true
        COMPARISON_EXIT_CODE=$?
        if [ $COMPARISON_EXIT_CODE -eq 0 ]; then
          echo "✅ Main baseline comparison passed"
          echo "main_comparison_passed=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Main baseline comparison failed - performance regression detected!"
          echo "main_comparison_passed=false" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Compare with current branch baseline (if exists)
      id: compare-current-baseline
      if: always() && steps.run-benchmarks.outcome == 'success' && steps.load-baselines.outputs.current_baseline_exists == 'true'
      run: |
        CURRENT_BRANCH="${{ steps.branch-info.outputs.current_branch }}"
        if [ "$CURRENT_BRANCH" == "main" ]; then
          CURRENT_BASELINE=".benchmarks/baselines/main_previous.json"
        else
          CURRENT_BASELINE=".benchmarks/baselines/${CURRENT_BRANCH}.json"
        fi
        if [ ! -f "$CURRENT_BASELINE" ]; then
          echo "❌ Error: Current branch baseline file not found"
          exit 1
        fi
        echo "📊 Comparing against current branch baseline (20% tolerance)..."
        uv run python .benchmarks/benchmark_compare.py compare-json \
          "$CURRENT_BASELINE" \
          benchmark-results.json \
          --tolerance=20 > current_comparison.txt 2>&1 || true
        COMPARISON_EXIT_CODE=$?
        if [ $COMPARISON_EXIT_CODE -eq 0 ]; then
          echo "✅ Current branch baseline comparison passed"
          echo "current_comparison_passed=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Current branch baseline comparison failed - performance regression detected!"
          echo "current_comparison_passed=false" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Summary of baseline comparisons
      if: always() && steps.run-benchmarks.outcome == 'success'
      run: |
        echo "## 📊 Benchmark Comparison Summary"
        echo ""
        if [ "${{ steps.load-baselines.outputs.main_baseline_exists }}" == "true" ]; then
          echo "✅ Compared against main branch baseline"
        else
          echo "ℹ️  No main branch baseline available (first run or main branch doesn't exist)"
        fi
        if [ "${{ steps.load-baselines.outputs.current_baseline_exists }}" == "true" ]; then
          echo "✅ Compared against current branch baseline"
        else
          echo "ℹ️  No current branch baseline available (first run for this branch)"
        fi
        if [ "${{ steps.load-baselines.outputs.main_baseline_exists }}" != "true" ] && \
           [ "${{ steps.load-baselines.outputs.current_baseline_exists }}" != "true" ]; then
          echo ""
          echo "⚠️  This appears to be the first benchmark run - no baselines to compare against."
          echo "   Future runs will compare against this baseline."
        fi
        echo ""
        echo "## 💾 Baseline Update Status"
        if [ "${{ steps.check-baseline-update.outputs.should_update }}" == "true" ]; then
          echo "✅ Baseline will be updated (performance changed significantly)"
        else
          echo "⏭️  Baseline update skipped (performance similar within 5%)"
        fi

    - name: Store benchmark results
      uses: actions/upload-artifact@v5
      with:
        name: benchmark-results-${{ matrix.python-version }}-${{ github.run_number }}
        path: benchmark-results.json
        retention-days: 30

    - name: Check if baseline should be updated
      id: check-baseline-update
      if: always() && steps.run-benchmarks.outcome == 'success'
      run: |
        CURRENT_BRANCH="${{ steps.branch-info.outputs.current_branch }}"
        BASELINE_FILE=".benchmarks/baselines/${CURRENT_BRANCH}.json"

        # Check if baseline exists
        if [ ! -f "$BASELINE_FILE" ]; then
          echo "ℹ️  No existing baseline - will create new baseline"
          echo "should_update=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Compare performance with existing baseline (5% threshold for updates)
        echo "📊 Checking if performance changed significantly..."
        if uv run python .benchmarks/benchmark_compare.py compare-json \
          "$BASELINE_FILE" \
          benchmark-results.json \
          --tolerance=5 > /dev/null 2>&1; then
          echo "✅ Performance is similar (within 5%) - skipping baseline update"
          echo "should_update=false" >> $GITHUB_OUTPUT
        else
          echo "📈 Performance changed significantly - will update baseline"
          echo "should_update=true" >> $GITHUB_OUTPUT
        fi

    - name: Save baseline for current branch
      if: always() && steps.run-benchmarks.outcome == 'success' && steps.check-baseline-update.outputs.should_update == 'true'
      run: |
        CURRENT_BRANCH="${{ steps.branch-info.outputs.current_branch }}"
        CURRENT_NODE="${{ steps.extract-node.outputs.node }}"
        echo "💾 Saving baseline for branch: $CURRENT_BRANCH (node: $CURRENT_NODE)"
        # Node will be automatically extracted from benchmark-results.json
        uv run python .benchmarks/benchmark_baseline.py save "$CURRENT_BRANCH" benchmark-results.json

    - name: Commit and push baseline for all branches
      if: github.event_name == 'push' && steps.run-benchmarks.outcome == 'success' && steps.check-baseline-update.outputs.should_update == 'true'
      uses: EndBug/add-and-commit@v9
      with:
        add: '.benchmarks/baselines/'
        default_author: github_actions
        message: 'chore(benchmark): update baseline for branch "${{ steps.branch-info.outputs.current_branch }}" (node: ${{ steps.extract-node.outputs.node }}) [skip ci]'
        pathspec_error_handling: exitImmediately
        push: true

    - name: Comment benchmark results on PR
      if: always() && github.event_name == 'pull_request' && steps.run-benchmarks.outcome == 'success'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');

          // Read benchmark results
          let results;
          try {
            results = JSON.parse(fs.readFileSync('benchmark-results.json', 'utf8'));
          } catch (error) {
            console.error('Failed to read benchmark results:', error);
            return;
          }

          // Extract node information
          const node = results.machine_info?.node || 'unknown';
          const pythonVersion = results.machine_info?.python_version || 'unknown';

          // Build comment
          let comment = '## 📊 Performance Benchmark Results\n\n';
          comment += `**Node:** ${node}  \n`;
          comment += `**Python Version:** ${pythonVersion}  \n`;
          comment += `**Branch:** ${{ steps.branch-info.outputs.current_branch }}  \n\n`;

          // Add benchmark results table
          comment += '### Benchmark Results\n\n';
          comment += '| Test | Mean Time | Threshold | Status |\n';
          comment += '|------|-----------|-----------|--------|\n';

          // Threshold map: test name substring → max seconds
          // Generous multipliers over observed CI times to avoid flaky failures
          const thresholds = {
            'help': 0.5,
            'inspect': 0.5,
            'e2e_create': 30.0,
            'e2e_search': 5.0,
            'parse_png': 10.0,
            'parse_large': 5.0,
            'full_connector_pipeline_mixed': 20.0,
            'full_connector_pipeline': 10.0,
            'batch_parse': 5.0,
            'parse_markdown_docs': 3.0,
          };

          function getThreshold(name) {
            for (const [key, val] of Object.entries(thresholds)) {
              if (name.includes(key)) return val;
            }
            return 1.0;  // default for fast unit-level benchmarks
          }

          function formatTime(seconds) {
            if (seconds < 0.001) return `${(seconds * 1_000_000).toFixed(0)}µs`;
            if (seconds < 1.0)   return `${(seconds * 1000).toFixed(1)}ms`;
            return `${seconds.toFixed(2)}s`;
          }

          results.benchmarks.forEach(bench => {
            const mean = bench.stats.mean;
            const threshold = getThreshold(bench.name);
            const status = mean < threshold ? '✅ PASS' : '❌ FAIL';
            comment += `| ${bench.name} | ${formatTime(mean)} | <${threshold}s | ${status} |\n`;
          });

          // Add comparison results if available
          comment += '\n### Baseline Comparisons\n\n';

          // Check for main baseline comparison
          const mainComparisonExists = '${{ steps.load-baselines.outputs.main_baseline_exists }}' === 'true';
          const mainComparisonPassed = '${{ steps.compare-main-baseline.outputs.main_comparison_passed }}' === 'true';
          const currentComparisonExists = '${{ steps.load-baselines.outputs.current_baseline_exists }}' === 'true';
          const currentComparisonPassed = '${{ steps.compare-current-baseline.outputs.current_comparison_passed }}' === 'true';

          // Check if we have any baselines at all
          const hasAnyBaseline = mainComparisonExists || currentComparisonExists;

          if (!hasAnyBaseline) {
            comment += '> ℹ️ **No baseline available for comparison**  \n';
            comment += '> This appears to be the first benchmark run for this PR.  \n';
            comment += '> Future benchmark runs will compare against this baseline.  \n\n';
          } else {
            // Main baseline comparison
            if (mainComparisonExists) {
              try {
                const mainComparison = fs.readFileSync('main_comparison.txt', 'utf8');
                comment += '#### vs Main Branch Baseline (20% tolerance)\n\n';
                comment += '```\n' + mainComparison + '\n```\n\n';
                if (mainComparisonPassed) {
                  comment += '✅ **Comparison passed** - No significant performance regression detected.\n\n';
                } else {
                  comment += '❌ **Comparison failed** - Performance regression detected!\n\n';
                }
              } catch (error) {
                comment += '⚠️ Main baseline comparison was attempted but results are not available.\n\n';
              }
            } else {
              comment += 'ℹ️ No main branch baseline available for comparison.\n\n';
            }

            // Current branch baseline comparison
            if (currentComparisonExists) {
              try {
                const currentComparison = fs.readFileSync('current_comparison.txt', 'utf8');
                comment += '#### vs Current Branch Baseline (20% tolerance)\n\n';
                comment += '```\n' + currentComparison + '\n```\n\n';
                if (currentComparisonPassed) {
                  comment += '✅ **Comparison passed** - No significant performance regression detected.\n\n';
                } else {
                  comment += '❌ **Comparison failed** - Performance regression detected!\n\n';
                }
              } catch (error) {
                comment += '⚠️ Current branch baseline comparison was attempted but results are not available.\n\n';
              }
            } else {
              comment += 'ℹ️ No current branch baseline available for comparison (first run for this branch).\n\n';
            }
          }

          // Add footer
          comment += '---\n';

          // Add baseline update status
          const shouldUpdate = '${{ steps.check-baseline-update.outputs.should_update }}' === 'true';
          if (shouldUpdate) {
            comment += '💾 **Baseline Update:** Will be updated (performance changed significantly)\n\n';
          } else {
            comment += '⏭️ **Baseline Update:** Skipped (performance similar within 5%)\n\n';
          }

          comment += '*This comment was automatically generated by the benchmark workflow.*\n';

          // Find and delete previous benchmark comments to avoid spam
          try {
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const oldComment of comments.data) {
              if (oldComment.user.type === 'Bot' &&
                  oldComment.body.includes('## 📊 Performance Benchmark Results')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: oldComment.id,
                });
              }
            }
          } catch (error) {
            console.log('Could not delete previous comments:', error.message);
          }

          // Create new comment
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: comment
          });
