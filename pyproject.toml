# Root workspace configuration for indexed monorepo
# This file manages the workspace and shared development dependencies
# Applications are in apps/ and shared packages are in packages/

# Ruff configuration
[tool.ruff]

[tool.ruff.lint.per-file-ignores]
# Connector reader files that use lambdas for tqdm callbacks
"packages/indexed-connectors/src/connectors/confluence/*_document_reader.py" = ["E731"]
"packages/indexed-connectors/src/connectors/jira/*_document_reader.py" = ["E731"]

# Pytest configuration
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    # Use package names (installed packages) instead of source paths
    # This works better with uv workspace where packages are installed in .venv
    "--cov=indexed",
    "--cov=core",
    "--cov=connectors",
    "--cov=indexed_config",
    "--cov=utils",
    "--cov-report=term",
]
filterwarnings = [
    # Suppress deprecations from third-party libs (faiss/numpy/swig)
    "ignore:.*numpy.core._multiarray_umath.*:DeprecationWarning",
    "ignore:.*builtin type SwigPyPacked has no __module__ attribute.*:DeprecationWarning",
    "ignore:.*builtin type SwigPyObject has no __module__ attribute.*:DeprecationWarning",
    "ignore:.*builtin type swigvarlink has no __module__ attribute.*:DeprecationWarning",
]

# Coverage configuration
[tool.coverage.run]
# Measure coverage for installed packages (not source paths)
# In uv workspace, packages are installed in .venv, so we use package names
source_pkgs = [
    "indexed",      # apps/indexed/src/indexed
    "core",         # packages/indexed-core/src/core
    "connectors",   # packages/indexed-connectors/src/connectors
    "indexed_config",  # packages/indexed-config/src/indexed_config
    "utils",        # packages/utils/src/utils
]
# Also include source directories for file path matching
source = [
    "apps/indexed/src/indexed",
    "packages/indexed-core/src/core",
    "packages/indexed-connectors/src/connectors",
    "packages/indexed-config/src/indexed_config",
    "packages/utils/src/utils",
]
# Exclude test files and directories
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/conftest.py",
    "*/setup.py",
]

[tool.coverage.report]
# Exclude patterns from coverage reports
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

# MyPy configuration
[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true

[tool.uv.workspace]
members = [
    "apps/*",
    "packages/*"
]

[tool.una]
namespace = "indexed"

[dependency-groups]
dev = [
    "mypy>=1.17.1",
    "pre-commit>=4.2.0",
    "pytest>=8.4.1",
    "pytest-benchmark>=4.0.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.14.1",
    "pytest-httpserver>=1.0.0",
    "pytest-xdist>=3.5.0",
    "pytest-rerunfailures>=12.0",
    "ruff>=0.12.10",
    "una>=0.7.0",
]
