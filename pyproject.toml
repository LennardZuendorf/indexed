# Root workspace configuration for indexed monorepo
# This file manages the workspace and shared development dependencies
# Individual packages are in packages/indexed-core and packages/indexed-cli

# Ruff configuration
[tool.ruff]

[tool.ruff.lint.per-file-ignores]
"src/main/sources/confluence/confluence_cloud_document_reader.py" = ["E731"]
"src/main/sources/confluence/confluence_document_reader.py" = ["E731"]
"src/main/sources/jira/jira_cloud_document_reader.py" = ["E731"]
"src/main/sources/jira/jira_document_reader.py" = ["E731"]

# Pytest configuration
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=src/main/services",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov"
]
filterwarnings = [
    # Suppress deprecations from third-party libs (faiss/numpy/swig)
    "ignore:.*numpy.core._multiarray_umath.*:DeprecationWarning",
    "ignore:.*builtin type SwigPyPacked has no __module__ attribute.*:DeprecationWarning",
    "ignore:.*builtin type SwigPyObject has no __module__ attribute.*:DeprecationWarning",
    "ignore:.*builtin type swigvarlink has no __module__ attribute.*:DeprecationWarning",
]

# MyPy configuration
[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true

[tool.uv.workspace]
members = [
    "packages/utils",
    "packages/indexed-connectors",
    "packages/indexed-core",
    "indexed"
]

[dependency-groups]
dev = [
    "mypy>=1.17.1",
    "pytest>=8.4.1",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.14.1",
    "ruff>=0.12.10",
]

