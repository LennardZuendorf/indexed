# Root workspace configuration for indexed monorepo
# This file manages the workspace and shared development dependencies
# Individual packages are in packages/indexed-core and packages/indexed-cli

# Ruff configuration
[tool.ruff]

[tool.ruff.lint.per-file-ignores]
# Connector reader files that use lambdas for tqdm callbacks
"packages/indexed-connectors/src/connectors/confluence/*_document_reader.py" = ["E731"]
"packages/indexed-connectors/src/connectors/jira/*_document_reader.py" = ["E731"]

# Pytest configuration
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=indexed/src/indexed",
    "--cov=packages/indexed-core/src/core",
    "--cov=packages/indexed-connectors/src/connectors",
    "--cov=packages/utils/src/utils",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov"
]
markers = [
    "indexed: Main indexed application tests",
    "connectors: Tests for indexed-connectors package",
    "core: Tests for indexed-core package",
    "utils: Tests for indexed-utils package",

    # Test type markers (integration testing)
    "integration: Integration tests requiring external services",
    "unit: Fast unit tests",
    "slow: Tests that take > 1 second",
    "api: Tests that interact with external APIs",

    # Environment markers (integration testing)
    "requires_api: Tests requiring real API credentials",
    "requires_network: Tests requiring network access",
]
filterwarnings = [
    # Suppress deprecations from third-party libs (faiss/numpy/swig)
    "ignore:.*numpy.core._multiarray_umath.*:DeprecationWarning",
    "ignore:.*builtin type SwigPyPacked has no __module__ attribute.*:DeprecationWarning",
    "ignore:.*builtin type SwigPyObject has no __module__ attribute.*:DeprecationWarning",
    "ignore:.*builtin type swigvarlink has no __module__ attribute.*:DeprecationWarning",
]

# MyPy configuration
[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true

[tool.uv.workspace]
members = [
    "packages/utils",
    "packages/indexed-connectors",
    "packages/indexed-core",
    "packages/indexed-config",
    "indexed"
]

[dependency-groups]
dev = [
    "mypy>=1.17.1",
    "pre-commit>=4.2.0",
    "pytest>=8.4.1",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.14.1",
    "pytest-httpserver>=1.0.0",
    "pytest-xdist>=3.5.0",
    "pytest-rerunfailures>=12.0",
    "ruff>=0.12.10",
]
